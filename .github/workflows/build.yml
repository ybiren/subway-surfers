name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip unzip zip \
            openjdk-17-jdk \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            build-essential git

      - name: Install buildozer and cython
        run: python -m pip install buildozer==1.5.0 cython==0.29.37

      - name: Clone p4a and force Python 3.13
        run: |
          git clone --depth 1 https://github.com/kivy/python-for-android.git /tmp/p4a
          python3 - << 'EOF'
          import re, pathlib, sys
          recipe = pathlib.Path("/tmp/p4a/pythonforandroid/recipes/python3/__init__.py")
          text = recipe.read_text()
          m = re.search(r"version\s*=\s*['\"]([^'\"]+)['\"]", text)
          ver = m.group(1) if m else "unknown"
          print(f"p4a python3 recipe version: {ver}")
          if ver.startswith("3.14"):
              t = re.sub(r"(version\s*=\s*['\"])[0-9.]+(['\"])", r"\g<1>3.13.0\g<2>", text)
              t = re.sub(r"(sha\d+sum\s*=\s*['\"])[^'\"]*(['\"])", r"\g<1>\g<2>", t)
              t = re.sub(r"(md5sum\s*=\s*['\"])[^'\"]*(['\"])", r"\g<1>\g<2>", t)
              recipe.write_text(t)
              print("Patched to 3.13.0, checksums cleared")
          else:
              print(f"Version {ver} is fine, no patch needed")
          EOF
          echo "p4a.source_dir = /tmp/p4a" >> client/buildozer.spec

      - name: Build APK
        working-directory: client
        run: yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: subway-surfers-controller
          path: client/bin/*.apk
